# Program-wide settings (Phase 0 + Phase 1 baseline; Phase-3 pre-registration freeze).
#
# PRE-REGISTRATION FREEZE (Step 2, 2026-07-11, operator-approved at Checkpoint B).
# The four blind values that must be set BEFORE the first run — k, gross floor, null
# draws N, null-percentile bar — are frozen below, each justified a-priori by universe
# structure / cost mechanics / statistical power, none by any observed result (there is
# none yet). The four inherited kill-gate bars are committed with provenance. This commit
# is the provenance proof that the bar preceded the experiment; the single blind smoke
# run is a strictly LATER commit. The liquidity floor was pre-registered in Phase 1.

logging:
  level: INFO
  renderer: console

# Master determinism seed for every stochastic path. Config, logged, frozen into
# the golden fixtures (Deep Dive 03, Check 4).
seed: 20260711

# --------------------------------------------------------------------------- #
# Layer 1 — Data & Universe (Phase 1). All paths/thresholds are config, never    #
# literals in code (Part I §1).                                                  #
# --------------------------------------------------------------------------- #
data:
  # The INHERITED external Parquet OHLCV cache — hat (3): a read-only external
  # input, distinct from the vendor source (frozen harness) and the golden
  # birthplace. Split/bonus back-adjusted (Kite; empirically verified); cash
  # dividends UNADJUSTED (bounded ex-div residual accepted for the survivor upper
  # bound; dividend adjustment deferred to Phase 4).
  #
  # This is a PLACEHOLDER, not a real location — the cache is machine-local and
  # never committed. Point at your local cache via the XSR_DATA_CACHE_PATH env var,
  # which overrides this value. Relative paths resolve against the repo root; when
  # the path does not exist (e.g. CI), cache-backed tests skip.
  cache_path: "data/cache/raw"
  interval: "5minute"

calendar:
  # Regular NSE session in IST; out-of-session bars (Muhurat evenings, pre/post)
  # are filtered at the ingest boundary, never trimmed from the raw store.
  session:
    regular_start: "09:15"
    regular_end: "15:30"
  # Default entry window (minutes after open) that defines the "entry instant" for
  # the circuit filter and the leakage tests. Swept {15,30,45} in Phase 2 — this
  # is only the Phase-1 default; the machinery is parametrized.
  entry_window_default_min: 30

hygiene:
  bad_tick:
    # A single 5-min bar whose |log-return| exceeds this is a suspected bad tick
    # (flagged + logged, never silently kept). 35% intra-bar move on a large cap.
    max_bar_abs_return: 0.35
  liquidity_floor:
    # PRE-REGISTERED (frozen): never rank a name you cannot exit. Median daily
    # traded value over the lookback must clear this. Large-cap survivors clear it
    # by orders of magnitude (logged); it goes load-bearing in the Phase-4 mid-caps.
    min_median_daily_value_inr: 50_000_000   # ₹5 crore
    lookback_days: 20

circuit:
  # Conservative circuit-lock / untradeable filter — when in doubt, drop.
  recent_range_lookback_bars: 20     # the name's own recent intraday range window
  min_range_ratio: 0.10              # entry-bar range < ratio * recent-median range => suspected lock
  low_volume_pctile: 0.10            # entry-bar volume below this time-of-day quantile => suspicious

universe:
  # Phase-1 point-in-time universe is the survivor-cache STUB (survivorship-
  # inflated upper bound); the real reconstruction is Phase 4.
  survivor_cache_file: "universe/survivor_cache.yaml"

sector:
  # Static point-in-time sector classification (a label map, not a price series)
  # feeding the Phase-2 ceil(k/2) sector cap.
  map_file: "sectors.yaml"

# --------------------------------------------------------------------------- #
# Layer 2 — Signal, Execution & Null (Phase 2). The k / gross-floor / N blind values #
# below were set at the Phase-3 pre-registration freeze (Step 2) — no longer TOY.     #
# Participation cap, spread multipliers, ATR period, sector-cap divisor were           #
# pre-registered in Phase 2.                                                           #
# --------------------------------------------------------------------------- #
signal:
  atr_period: 20               # ATR-20 (DAILY) for A-Z normalization + risk-parity (frozen)

execution:
  # k = 5 (FROZEN BLIND, Step 2). A-priori: top-5 of the 49-name universe ~ the top-10%
  # tail (selective), 5-name intra-leg diversification, and ceil(5/2)=3 per-sector cap
  # that binds the dominant 11-name Financials cluster. Re-derived on merit (coincides
  # with the retired TOY 5), not outcome-tuned.
  k_per_leg: 5
  participation_cap: 0.01      # <= 1% of entry-window volume (frozen Phase 2, pessimistic)
  # gross floor = ₹100,000 (RE-FROZEN BLIND v2, 2026-07-11; supersedes the ill-posed
  # ₹5,000,000 of Step 2 — that value stays in history at `pre-registration-frozen`).
  # WHY v2: the Step-2 rationale ("floor where bps dominate fixed cost") was ill-posed —
  # the frozen cost model is SCALE-INVARIANT (flat ~16-23 bps, no fixed component), so no
  # cost-mechanical floor exists at all. The ONLY small-size effect is integer-share
  # granularity; ₹100,000 is the MINIMAL floor at which every selected name forms a real
  # whole-share position (below it, per-name notional < ₹20k = single-digit shares of a
  # high-priced name — not a formable book). NOT tuned to a survival rate; chosen with
  # ZERO sight of any return (the only reason a re-freeze is legitimate).
  # SIZE CAVEAT (stamped on every result, never separable from an "it works" reading):
  # the strategy structurally selects thin extreme-gap names, so the median feasible book
  # is only ₹3-5M with a fat low tail; at this floor integer-share tracking error (up to
  # ~10 bps) is materially present in the P&L. Existence-test-valid (cost is scale-
  # invariant, so the edge/no-edge signal survives the granularity noise) but a small-
  # size / LOW-CAPACITY finding — a real property of the idea that follows into Phase-4
  # mid-caps (likely worse there).
  gross_floor_inr: 100_000
  sector_cap_divisor: 2        # ceil(k / divisor) names per sector per leg (frozen Phase 2)

cost:
  optimistic_spread_multiplier: 1.0    # raw Corwin-Schultz implied spread (frozen Phase 2)
  pessimistic_spread_multiplier: 3.0   # ~3x implied spread (frozen Phase 2)

# Quoted so the key is the string "null", not a YAML null literal (which parses to
# None and hides the block from load_layer2_config — a latent Phase-2 parse bug).
"null":
  # N = 1000 null draws/day (FROZEN BLIND, Step 2). A-priori: percentile resolution —
  # ~50 draws in the upper 5% tail give the 95th-percentile bar a stable estimate;
  # memoryless seeded draws, so the one-time cost is trivial.
  draws_per_day: 1000

# --------------------------------------------------------------------------- #
# Layer 3 — Validation & Gate (Phase 3). Pre-registered gate bars (Step 2 freeze).   #
# --------------------------------------------------------------------------- #
gate:
  # null-percentile = 95th (FROZEN BLIND, Step 2). Derived from an a-priori per-arm
  # false-positive tolerance alpha = 0.05: beating the P-th percentile => under H0
  # (ranked ~ random) an arm clears it by luck with probability (100-P)/100 = alpha,
  # so alpha = 0.05 => P = 95. NOT inflated for the 6 arms — cross-arm multiplicity is
  # owned entirely by the DSR/effective-N deflation, so raising P to cover arm-count
  # would double-count. The asymmetric false-PASS cost argues against dropping below 90.
  null_percentile: 95
  # Inherited kill-gate bars — pre-registered with provenance (NOT invented here):
  dsr_min: 0.95                # DSR = P(true Sharpe > inflated benchmark); 0.95 is the
                               # 95%-confidence bar, the companion to alpha = 0.05.
  pbo_max: 0.20                # documented VERBATIM in the vendored pbo.py
                               # ("Kill-gate criterion 3 pins PBO < 0.20") — inherited.
  cpcv_median_min: 0.0         # sign criterion: the median CPCV path must be positive.
  positive_fraction_min: 0.5   # sign criterion: a majority of finite paths positive.
  # absolute-net bar (added 2026-07-12, post the World-B ruling). beat-random is
  # NECESSARY BUT NOT SUFFICIENT: the retired gap-reversal ranker proved an arm can beat a
  # cost-bled random book on the excess stream (~+10 bps/day selection alpha) yet still
  # LOSE ~74-220 bps/day net of cost. This bar requires the arm's median daily ABSOLUTE
  # net return (per cost bound) to clear zero — make money net of cost, not merely beat
  # random. 0.0 is the un-arguable break-even line, NOT outcome-tuned (it can only make the
  # gate stricter, never resurrect an arm); survivorship-inflated upper bounds mean
  # clearing it is necessary-not-sufficient. Per-bound, so it rides the cost corridor.
  absolute_net_min: 0.0
  # STOP-and-flag near-threshold bands (pre-registered, conservative; not gate bars —
  # a binding criterion within its band is flagged NEAR_THRESHOLD for operator ruling,
  # never a silent PASS/KILL at the margin).
  near_margin_percentile: 2.0  # points around the null-percentile bar
  near_margin_prob: 0.02       # around the DSR / PBO / positive-fraction bars
  near_margin_sharpe: 0.02     # around the CPCV median bar
  near_margin_net: 0.0002      # +/-2 bps around the absolute-net bar -> NEAR_THRESHOLD (operator rules)
  # CPCV / PBO structural params — PINNED PRE-RUN (pre-registration addendum, Step 3a,
  # operator-approved). They shape the gate, so they carry the same "fixed before the
  # result" guarantee as the four blind values; none is outcome-derived.
  cpcv_n_groups: 6             # C(6,2)=15 CPCV paths: a power/compute balance at ~2,700 obs
  cpcv_k_test: 2               # test groups per CPCV combination
  pbo_n_splits: 16             # CSCV blocks — the vendored harness default (DEFAULT_N_SPLITS)
  periods_per_year: 252        # daily trading-day annualization

# --------------------------------------------------------------------------- #
# Durable effective-N trial ledger (R2 fix, 2026-07-12 — Inviolable Rule 4).     #
# --------------------------------------------------------------------------- #
ledger:
  # The DURABLE, in-repo, COMMITTED trial ledger. The vendored TrialLedger persists one
  # JSON stream per trial; candidate #1's run wrote them to an EPHEMERAL dir and lost them
  # (found-and-fixed defect, same class as the null bug) — so effective-N could not cluster
  # across sessions and the DSR bar was silently undercounted for every future candidate.
  # This path is the durable replacement; it is NOT under /data/ (which .gitignore ignores),
  # so it is versioned with the repo. Resolved relative to the repo root.
  dir: "ledger"
  # Manifest (under dir) declaring which prior candidates' trial streams MUST be present.
  # verify_ledger_integrity() FAILS CLOSED if any listed stream is missing/empty — no
  # silently-undercounted effective-N, ever. Populated by scripts/regenerate_ledger.py.
  manifest_file: "MANIFEST.yaml"
