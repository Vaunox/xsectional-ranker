# Indian intraday (MIS) cost model — STATUTORY rates.
#
# Statutory rates drift; they live here, never hard-coded in the backtester
# (Part III Layer 2, Inviolable Rule 3). All rates are fractions of turnover
# unless noted. NO DP charge — that applies to delivery (CNC) sells, not MIS
# intraday. A round trip is one buy + one sell.
#
# VERIFIED STANDARD FEE MODEL (2026-07-12). The statutory rates below were cross-checked
# against the live Zerodha intraday (MIS) schedule and confirmed exact. Round-trip they
# total ~4.5 bps/name @ ₹500k notional → ~8.2 bps @ ₹100k (only the ₹20 brokerage cap is
# size-dependent). These fees are NOT the disputed quantity — the SPREAD is. Cost-realism
# finding (RESEARCH_FINDINGS.md §5.3): Corwin-Schultz over-reads spread ~2-3x on the
# high-range, gap-selected names the ranker trades. STANDARD COST MODEL = these verified
# fees + a DEFENSIBLE spread (a conservative fixed bound and/or Abdi-Ranaldo), NEVER
# Corwin-Schultz alone. The `slippage` block below is the frozen default the Layer-2 cost
# corridor overrides; the corridor's spread params are pinned blind per candidate.

brokerage:
  rate: 0.0003        # 0.03% of order value...
  cap: 20.0           # ...but capped at ₹20 per executed order (lower of the two)

stt:
  sell_rate: 0.00025  # Securities Transaction Tax: 0.025% on the SELL side (intraday equity)

exchange_txn:
  rate: 0.0000297     # NSE exchange transaction charge ≈ 0.00297% per side

sebi_turnover:
  rate: 0.000001      # SEBI turnover fee: ₹10 per crore = 0.0001% per side

stamp:
  buy_rate: 0.00003   # Stamp duty: 0.003% on the BUY side

gst:
  rate: 0.18          # 18% GST on (brokerage + exchange txn + SEBI turnover fee)

slippage:
  base_rate: 0.0005          # 0.05% per side, fixed floor in normal conditions
  impact_coefficient: 0.002  # square-root market impact: +coeff*sqrt(participation) per side
  participation_cap: 0.10    # cap order participation in a bar's traded value at 10%
  stress_multiplier: 3.0     # widen slippage in stressed/illiquid conditions
