# Static point-in-time sector classification for the survivor-cache universe.
#
# A cheap LABEL map (not a price series), feeding the Phase-2 ceil(k/2)-per-sector
# cap: a clustered sector gap is macro repricing, not idiosyncratic overreaction,
# so fading it violates the signal's core hypothesis. Every universe symbol must
# map to exactly one sector (validated in gate-zero). Coarse NSE macro-sectors;
# the taxonomy is refined in Phase 2/4 — Phase 1 needs coverage + a single label.
